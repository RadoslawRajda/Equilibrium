# Single build for `cryptocatan/player-agent:local` — four runtime services share this image.
# (Defining `build` on each bot triggers parallel builds and a race: "image already exists".)
x-player-runtime: &player-runtime
  image: cryptocatan/player-agent:local
  volumes:
    - ./contracts/deployments:/contracts/deployments:ro
  extra_hosts:
    - "host.docker.internal:host-gateway"
  depends_on:
    ganache:
      condition: service_started
    hardhat:
      condition: service_started
    player-agent-image:
      condition: service_completed_successfully

services:
  ganache:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint:
      - anvil
    ports:
      - "8545:8545"
    command:
      - --host
      - ${ANVIL_HOST:-0.0.0.0}
      - --port
      - "${ANVIL_PORT:-8545}"
      - --mnemonic
      - "${ANVIL_MNEMONIC}"
      - --chain-id
      - "${CHAIN_ID:-1337}"
      - --accounts
      - "${ANVIL_ACCOUNTS:-16}"
      - --balance
      - "${ANVIL_BALANCE:-1000}"
      - --block-time
      - "${ANVIL_BLOCK_TIME:-1}"
      - --hardfork
      - ${ANVIL_HARDFORK:-Cancun}
      - --steps-tracing

  hardhat:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./contracts:/app
    command: >
      sh -c "export HARDHAT_DISABLE_TELEMETRY=true && export HARDHAT_DISABLE_TELEMETRY_PROMPT=true && npm install &&
      npx hardhat compile &&
      npx hardhat run scripts/deploy.js --network ganache &&
      tail -f /dev/null"
    depends_on:
      - ganache

  # Pimlico Alto: jedna usługa RPC (eth_sendUserOperation / estymacje). Nazwa `paymaster` to tylko alias serwisu — to nie jest kontrakt on-chain.
  paymaster:
    image: ghcr.io/pimlicolabs/alto:latest
    entrypoint:
      - /bin/sh
      - -lc
    command:
      - |
        EP=""
        while [ -z "$$EP" ]; do
          if [ -f /contracts/deployments/localhost.json ]; then
            EP=$$(node -e "const fs=require('fs');const p='/contracts/deployments/localhost.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));process.stdout.write((j.contracts && j.contracts.EntryPoint && j.contracts.EntryPoint.address) || '')")
          fi
          if [ -z "$$EP" ]; then
            echo "Waiting for EntryPoint in /contracts/deployments/localhost.json"
            sleep 2
          fi
        done
        node src/esm/cli/alto.js run \
          --entrypoints "$$EP" \
          --executor-private-keys "${BUNDLER_EXECUTOR_KEY}" \
          --utility-private-key "${BUNDLER_UTILITY_KEY}" \
          --rpc-url ${GANACHE_DOCKER_RPC_URL:-http://ganache:8545} \
          --network-name ${BUNDLER_NETWORK_NAME:-ganache} \
          --host ${BUNDLER_HOST:-0.0.0.0} \
          --port ${BUNDLER_PORT:-4337} \
          --metrics-port ${BUNDLER_METRICS_PORT:-4338} \
          --min-balance ${BUNDLER_MIN_BALANCE:-0} \
          --safe-mode ${BUNDLER_SAFE_MODE:-false}
    restart: on-failure
    ports:
      - "4337:4337"
      - "4338:4338"
    volumes:
      - ./contracts/deployments:/contracts/deployments:ro
    depends_on:
      - ganache
      - hardhat

  player-agent-image:
    image: cryptocatan/player-agent:local
    build: ./agents/player
    restart: "no"
    entrypoint: ["/bin/true"]

  equinox-agent:
    <<: *player-runtime
    environment:
      RPC_URL: ${GANACHE_DOCKER_RPC_URL:-http://ganache:8545}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      AGENT_ACCOUNT_INDEX: "${EQUINOX_AGENT_ACCOUNT_INDEX:-10}"
      MNEMONIC: ${ANVIL_MNEMONIC}
      DEPLOYMENTS_PATH: /contracts/deployments/localhost.json
      POLL_MS: "${EQUINOX_POLL_MS:-8000}"
      AGENT_NAME: Equinox
      PLAYER_IDENTITY_PATH: personas/equinox.md
      METRICS_PORT: "${PLAYER_METRICS_PORT:-9100}"

  aurora-agent:
    <<: *player-runtime
    environment:
      RPC_URL: ${GANACHE_DOCKER_RPC_URL:-http://ganache:8545}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      AGENT_ACCOUNT_INDEX: "${AURORA_AGENT_ACCOUNT_INDEX:-11}"
      MNEMONIC: ${ANVIL_MNEMONIC}
      DEPLOYMENTS_PATH: /contracts/deployments/localhost.json
      POLL_MS: "${AURORA_POLL_MS:-8200}"
      AGENT_NAME: Aurora
      PLAYER_IDENTITY_PATH: personas/aurora.md
      METRICS_PORT: "${PLAYER_METRICS_PORT:-9100}"

  crucible-agent:
    <<: *player-runtime
    environment:
      RPC_URL: ${GANACHE_DOCKER_RPC_URL:-http://ganache:8545}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      AGENT_ACCOUNT_INDEX: "${CRUCIBLE_AGENT_ACCOUNT_INDEX:-12}"
      MNEMONIC: ${ANVIL_MNEMONIC}
      DEPLOYMENTS_PATH: /contracts/deployments/localhost.json
      POLL_MS: "${CRUCIBLE_POLL_MS:-8400}"
      AGENT_NAME: Crucible
      PLAYER_IDENTITY_PATH: personas/crucible.md
      METRICS_PORT: "${PLAYER_METRICS_PORT:-9100}"

  drift-agent:
    <<: *player-runtime
    environment:
      RPC_URL: ${GANACHE_DOCKER_RPC_URL:-http://ganache:8545}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      AGENT_ACCOUNT_INDEX: "${DRIFT_AGENT_ACCOUNT_INDEX:-13}"
      MNEMONIC: ${ANVIL_MNEMONIC}
      DEPLOYMENTS_PATH: /contracts/deployments/localhost.json
      POLL_MS: "${DRIFT_POLL_MS:-8600}"
      AGENT_NAME: Drift
      PLAYER_IDENTITY_PATH: personas/drift.md
      METRICS_PORT: "${PLAYER_METRICS_PORT:-9100}"

  assistant-agent:
    image: cryptocatan/assistant-agent:local
    build: ./agents/assistant
    ports:
      - "4060:4060"
    environment:
      PORT: "${ASSISTANT_PORT:-4060}"
      RPC_URL: ${GANACHE_DOCKER_RPC_URL:-http://ganache:8545}
      DEPLOYMENTS_PATH: /contracts/deployments/localhost.json
      CONTEXT_TIMEOUT_MS: "${ASSISTANT_CONTEXT_TIMEOUT_MS:-6000}"
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      ASSISTANT_OLLAMA_URL: ${ASSISTANT_OLLAMA_URL:-http://host.docker.internal:11434}
      ASSISTANT_OLLAMA_MODEL: ${ASSISTANT_OLLAMA_MODEL:-llama3.2}
    volumes:
      - ./contracts/deployments:/contracts/deployments:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      ganache:
        condition: service_started
      hardhat:
        condition: service_started

  # --------------------------------------------------------------------------
  # Monitoring stack (Prometheus + Grafana + on-chain exporter)
  # --------------------------------------------------------------------------
  chain-exporter:
    build: ./monitoring/chain-exporter
    environment:
      RPC_URL: ${GANACHE_DOCKER_RPC_URL:-http://ganache:8545}
      DEPLOYMENTS_PATH: /contracts/deployments/localhost.json
      POLL_MS: "${CHAIN_EXPORTER_POLL_MS:-10000}"
      MNEMONIC: ${ANVIL_MNEMONIC}
      BUNDLER_RPC_URL: ${BUNDLER_RPC_URL:-http://paymaster:4337}
      BUNDLER_EXECUTOR_KEY: ${BUNDLER_EXECUTOR_KEY}
      BUNDLER_UTILITY_KEY: ${BUNDLER_UTILITY_KEY}
    volumes:
      - ./contracts/deployments:/contracts/deployments:ro
    depends_on:
      - ganache
      - hardhat
      - paymaster

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - chain-exporter
      - assistant-agent

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus

  # Slither static-analysis audit — run with: docker compose --profile audit run --rm slither
  slither:
    image: trailofbits/eth-security-toolbox:latest
    volumes:
      - ./contracts:/contracts
    working_dir: /contracts
    entrypoint: ["/bin/sh", "-c"]
    command: "npm install --silent 2>&1 | tail -3 && slither . --config-file slither.config.json"
    profiles: ["audit"]

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - ./contracts/deployments:/contracts/deployments:ro
    environment:
      - VITE_CHAIN_ID=${CHAIN_ID:-1337}
      - VITE_RPC_URL=${GANACHE_HOST_RPC_URL:-http://localhost:8545}
      - VITE_BUNDLER_URL=${VITE_BUNDLER_URL:-/bundler}
      - VITE_ASSISTANT_API_URL=${VITE_ASSISTANT_API_URL:-http://localhost:4060}
      - VITE_WALLETCONNECT_PROJECT_ID=${VITE_WALLETCONNECT_PROJECT_ID:-demo-project-id}
    ports:
      - "3000:3000"
    command: >
      sh -c "
      apk add --no-cache python3 make g++ linux-headers &&
      npm install --legacy-peer-deps &&
      node scripts/sync-abi.mjs &&
      EP=$$(node -e \"const fs=require('fs');const p='/contracts/deployments/localhost.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));process.stdout.write(j?.contracts?.EntryPoint?.address || '')\") &&
      if [ -n \"$$EP\" ]; then export VITE_ENTRYPOINT_ADDRESS=$$EP; fi &&
      npm run dev -- --host 0.0.0.0 --port 3000"
    depends_on:
      - paymaster
      - hardhat
      - assistant-agent
