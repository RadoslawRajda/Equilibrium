services:
  ganache:
    image: trufflesuite/ganache:v7.9.2
    ports:
      - "8545:8545"
    command:
      - --chain.vmErrorsOnRPCResponse=true
      - --wallet.totalAccounts=12
      - --wallet.deterministic
      - --miner.blockTime
      - "1"
      - --wallet.defaultBalance=1000
      - --server.host=0.0.0.0

  hardhat:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./contracts:/app
    command: >
      sh -c "export HARDHAT_DISABLE_TELEMETRY=true && export HARDHAT_DISABLE_TELEMETRY_PROMPT=true && npm install &&
      npx hardhat compile --force &&
      npx hardhat run scripts/deploy.js --network ganache &&
      tail -f /dev/null"
    depends_on:
      - ganache

  backend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./contracts/deployments:/contracts/deployments:ro
    environment:
      - PORT=4000
      - RPC_URL=http://ganache:8545
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3.2
      - ROUND_DURATION_MS=300000
      - ZERO_ROUND_DURATION_MS=300000
      - DEPLOYMENTS_PATH=/contracts/deployments/localhost.json
    ports:
      - "4000:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - ganache
      - hardhat

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    environment:
      - VITE_BACKEND_URL=http://localhost:4000
      - VITE_CHAIN_ID=1337
      - VITE_RPC_URL=http://localhost:8545
      - VITE_WALLETCONNECT_PROJECT_ID=demo-project-id
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    depends_on:
      - backend
